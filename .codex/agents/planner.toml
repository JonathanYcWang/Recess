# .codex/agents/planner.toml

name = "planner"
description = "Recess planner. Reads a GitHub issue, aligns with developer via grill-me, writes implementation plan back to issue. Read-only codebase access."
model = "gpt-5"
model_reasoning_effort = "high"
sandbox_mode = "read-only"

[mcp_servers.github]
url = "https://api.githubcopilot.com/mcp/"
bearer_token_env_var = "GITHUB_PAT_TOKEN"
enabled_tools = ["get_issue", "update_issue", "list_issues"]
