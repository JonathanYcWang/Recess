# .codex/agents/reviewer.toml

name = "reviewer"
description = "Recess reviewer. Checks implementation against architecture rules, explains findings, opens PR if clean. Read-only codebase access."
model = "gpt-5"
model_reasoning_effort = "high"
sandbox_mode = "read-only"

[mcp_servers.github]
url = "https://api.githubcopilot.com/mcp/"
bearer_token_env_var = "GITHUB_PAT_TOKEN"
enabled_tools = ["get_issue", "create_pull_request", "list_commits", "get_file_contents"]
