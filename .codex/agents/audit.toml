# .codex/agents/audit.toml

name = "audit"
description = "Recess audit agent. Scans codebase for architecture violations. Creates one GitHub issue per violation type with file paths and line numbers."
model = "gpt-5"
model_reasoning_effort = "high"
sandbox_mode = "read-only"

[mcp_servers.github]
url = "https://api.githubcopilot.com/mcp/"
bearer_token_env_var = "GITHUB_PAT_TOKEN"
enabled_tools = ["create_issue", "list_issues", "get_file_contents"]
